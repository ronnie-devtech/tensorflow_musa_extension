name: PR Validation (MUSA GPU)

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: [self-hosted, musa-gpu]

    env:
      PR_PATH: /home/runner/pr_test_${{ github.run_id }}_${{ github.run_attempt }}
      CONTAINER: Runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy code into running container
        run: |
          docker exec $CONTAINER mkdir -p $PR_PATH
          docker cp . $CONTAINER:$PR_PATH
          echo "✅ Code copied to container path: $PR_PATH"

      # ==============================
      # clang-format 代码格式检查
      # ==============================
      - name: Check code formatting (clang-format)
        id: run-format
        run: |
          if docker exec $CONTAINER bash -c "cd $PR_PATH && find . -regex '.*\.\(cpp\|hpp\|c\|h\|cu\)' -print0 | xargs -0 clang-format --Werror --dry-run"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # ==============================
      # Build
      # ==============================
      - name: Run build script
        id: run-build
        if: steps.run-format.outputs.status == 'success'
        run: |
          if docker exec $CONTAINER bash -c "cd $PR_PATH && ./build.sh"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # ==============================
      # Integration Test
      # ==============================
      - name: Run integration tests
        id: run-integration
        if: steps.run-build.outputs.status == 'success'
        run: |
          if docker exec $CONTAINER bash -c "cd $PR_PATH && python test_runner.py"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # ==============================
      # 清理 workspace
      # ==============================
      - name: Clean up container workspace
        if: always()
        run: |
          docker exec $CONTAINER rm -rf $PR_PATH

      # ==============================
      # CI 总结输出
      # ==============================
      - name: CI Summary
        if: always()
        run: |
          echo "## CI Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ steps.run-format.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.run-build.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Test | ${{ steps.run-integration.outputs.status }} |" >> $GITHUB_STEP_SUMMARY